    <p>Nook（以下「本サービス」）においてユーザーの個人情報の取扱いについて、以下のとおりプライバシーポリシーを定めます。</p>

    <h2>1. 個人情報の収集方法</h2>
    <p>当社は、ユーザーが利用登録をする際に氏名やメールアドレスなどの個人情報をお尋ねすることがあります。</p>

    <h2>2. 利用目的</h2>
    <p>収集した情報は、サービスの提供、お問い合わせ対応、メンテナンス情報等の通知のために利用します。</p>

    <h2>3. 第三者提供</h2>
    <p>法令で定められた場合を除き、事前の同意なく第三者に個人情報を提供することはありません。</p>
